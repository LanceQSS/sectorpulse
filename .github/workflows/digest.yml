name: daily-digest

on:
  schedule:
    - cron: "0 12 * * *" # 12:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_EMAIL_TO: ${{ vars.DIGEST_EMAIL_TO }}
        run: python -m sectorpulse.run

      # Runs even when the pipeline exits non-zero (e.g. delivery failed):
      # the archive and the digest/alert file must still be committed.
      - name: Commit archive and digest
        if: always()
        run: |
          git config user.name "sectorpulse-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ digests/
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "digest: $(date -u +%F)"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi
